<header class="header">
  <a routerLink="/" class="header__logo" (click)="closeMenu()">
    <img src="assets/logo/Domflix.png" alt="Domflix">
  </a>
  <nav class="header__navigation">
    @for(item of navigation; track item.route){
      <a
        [routerLink]="item.route"
        routerLinkActive="active"
        [routerLinkActiveOptions]="{exact:item.route === '/'}">
        {{item.label}}
      </a>
    }
  </nav>
  <div class="header__actions">
    <app-theme-toggle/>
    <button class="header__toggle" (click)="toggleMenu()">
      @if(menuOpen()){
        ✕
      }@else{
        ☰
      }
    </button>
  </div>
</header>
@if(menuOpen()){
<div class="drawer__backdrop" (click)="closeMenu()"></div>
}
<aside class="drawer" [class.drawer--open]="menuOpen()">
<nav class="drawer__navigation">
@for(item of navigation; track item.route){
<a
[routerLink]="item.route"
routerLinkActive="active"
[routerLinkActiveOptions]="{exact:item.route === '/'}"
(click)="closeMenu()">
{{item.label}}
</a>
}
<div class="drawer__theme">
<app-theme-toggle/>
</div>
</nav>
</aside>
