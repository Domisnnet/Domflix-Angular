<header class="main__header">
  <div class="header__brand">
    <a routerLink="/" class="header__logo" aria-label="Logo do Domflix">
      <img src="assets/logo/Domflix-logo.png" alt="Logo Domflix">
    </a>
  </div>
  <div class="header__brand">
    <a routerLink="/" class="header__logo2" aria-label="Logo do Domflix">
      <img src="assets/logo/Logo-secundaria.png" alt="Segunda Logo Domflix">
    </a>
  </div>
  <nav class="header__nav" aria-label="Navegação principal">
    <a routerLink="/" routerLinkActive="active">Home</a>
    <a routerLink="/profiles" routerLinkActive="active">Perfis</a>
    <a routerLink="/catalog" routerLinkActive="active">Catálogo</a>
    <a routerLink="/projects" routerLinkActive="active">Projetos</a>
    <a routerLink="/case-studies" routerLinkActive="active">Case Studies</a>
  </nav>
  <div class="header__actions">
    <app-theme-toggle></app-theme-toggle>
    <button
      type="button"
      class="header__toggle-menu"
      aria-label="Abrir menu"
    >
      ☰
    </button>
  </div>
</header>
