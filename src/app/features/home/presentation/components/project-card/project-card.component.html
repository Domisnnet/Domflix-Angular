<article class="project-card">
  <img [src]="project.imageUrl" [alt]="project.title">
  <div class="project-card__body">
    <h3>{{ project.title }}</h3>
    <p>{{ project.description }}</p>
    <div class="project-card__tech">
      <span *ngFor="let tech of project.tech">{{ tech }}</span>
    </div>
  </div>
</article>
