<article class="project-card">
  <img [src]="project.cover" [alt]="project.title" class="project-card__image" />
  <div class="project-card__body">
    <h3>{{ project.title }}</h3>
    <p *ngIf="project.description">{{ project.description }}</p>
    <div class="project-card__tech" *ngIf="project.tech?.length">
      <span *ngFor="let item of project.tech">{{ item }}</span>
    </div>
  </div>
</article>
