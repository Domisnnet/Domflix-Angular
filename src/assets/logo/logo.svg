<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">

    <defs>
        <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#FF2D55"/>
            <stop offset="100%" stop-color="#E50914"/>
        </linearGradient>

        <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
            <feDropShadow dx="0" dy="12" stdDeviation="12" flood-opacity=".25"/>
        </filter>
    </defs>

    <!-- Container -->

    <rect
        x="56"
        y="96"
        width="400"
        height="260"
        rx="36"
        fill="#121212"
        filter="url(#shadow)"
    />

    <!-- Moldura -->

    <rect
        x="72"
        y="112"
        width="368"
        height="228"
        rx="24"
        stroke="url(#gradient)"
        stroke-width="8"
    />

    <!-- Play -->

    <polygon
        points="220,170 220,282 320,226"
        fill="url(#gradient)"
    />

    <!-- Base -->

    <rect
        x="200"
        y="376"
        width="112"
        height="18"
        rx="9"
        fill="#333333"
    />

    <rect
        x="168"
        y="394"
        width="176"
        height="18"
        rx="9"
        fill="#1F1F1F"
    />

    <!-- Texto -->

    <text
        x="256"
        y="470"
        text-anchor="middle"
        font-family="Segoe UI, Arial, sans-serif"
        font-size="42"
        font-weight="700"
        fill="#FFFFFF"
        letter-spacing="3">

        DOMFLIX

    </text>

</svg>